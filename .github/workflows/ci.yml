name: CI

env:
  ZIG_VERSION: "0.15.2"

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: bash .github/scripts/install-zig.sh "${ZIG_VERSION}"

      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: zig-${{ matrix.target }}-${{ hashFiles('src/**/*.zig', 'build.zig', 'build.zig.zon') }}
          restore-keys: zig-${{ matrix.target }}-

      - name: Run tests
        run: zig build test --summary all 2>&1 | tee test-output.txt

      - name: Build ReleaseSmall
        run: zig build -Doptimize=ReleaseSmall

      - name: Preserve binary
        run: |
          mkdir -p ci-artifacts
          cp "zig-out/bin/zig-proxy-api${{ runner.os == 'Windows' && '.exe' || '' }}" "ci-artifacts/"

      - name: Job summary
        if: always()
        run: |
          echo "## zig-proxy-api CI — ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          if [ -f test-output.txt ]; then
            TESTS=$(grep -o '[0-9]*/[0-9]* tests passed' test-output.txt | head -1 || true)
            echo "| Tests | ${TESTS:-—} |" >> $GITHUB_STEP_SUMMARY
          fi
          BIN="ci-artifacts/zig-proxy-api${{ runner.os == 'Windows' && '.exe' || '' }}"
          if [ -f "$BIN" ]; then
            SIZE=$(wc -c < "$BIN" | tr -d ' ')
            SIZE_HR=$(awk "BEGIN {printf \"%.1f MB\", $SIZE / 1048576}")
            echo "| Binary (ReleaseSmall) | ${SIZE_HR} |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: zig-proxy-api-${{ matrix.target }}
          path: ci-artifacts/zig-proxy-api${{ runner.os == 'Windows' && '.exe' || '' }}
