name: Release

env:
  ZIG_VERSION: "0.15.2"

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            zig_target: x86_64-linux-musl
            ext: ""
          - os: ubuntu-latest
            target: linux-aarch64
            zig_target: aarch64-linux-musl
            ext: ""
          - os: macos-latest
            target: macos-aarch64
            zig_target: aarch64-macos
            ext: ""
          - os: macos-latest
            target: macos-x86_64
            zig_target: x86_64-macos
            ext: ""
          - os: windows-latest
            target: windows-x86_64
            zig_target: x86_64-windows
            ext: ".exe"
          - os: windows-latest
            target: windows-aarch64
            zig_target: aarch64-windows
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: bash .github/scripts/install-zig.sh "${ZIG_VERSION}"

      - name: Build ReleaseSmall
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseSmall

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: zig-proxy-api-${{ matrix.target }}
          path: zig-out/bin/zig-proxy-api${{ matrix.ext }}

  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8

      - name: Rename binaries
        run: |
          mv zig-proxy-api-linux-x86_64/zig-proxy-api zig-proxy-api-linux-x86_64.bin
          mv zig-proxy-api-linux-aarch64/zig-proxy-api zig-proxy-api-linux-aarch64.bin
          mv zig-proxy-api-macos-aarch64/zig-proxy-api zig-proxy-api-macos-aarch64.bin
          mv zig-proxy-api-macos-x86_64/zig-proxy-api zig-proxy-api-macos-x86_64.bin
          mv zig-proxy-api-windows-x86_64/zig-proxy-api.exe zig-proxy-api-windows-x86_64.exe
          mv zig-proxy-api-windows-aarch64/zig-proxy-api.exe zig-proxy-api-windows-aarch64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zig-proxy-api-linux-x86_64.bin
            zig-proxy-api-linux-aarch64.bin
            zig-proxy-api-macos-aarch64.bin
            zig-proxy-api-macos-x86_64.bin
            zig-proxy-api-windows-x86_64.exe
            zig-proxy-api-windows-aarch64.exe
          generate_release_notes: true
